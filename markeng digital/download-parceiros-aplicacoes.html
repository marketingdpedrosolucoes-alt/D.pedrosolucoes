<!DOCTYPE html>
<html>
<head>
    <title>Download - Parceiros e Aplicações</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif; }
        body { background: linear-gradient(135deg, #667eea 0%, #764ba2 100%); min-height: 100vh; padding: 20px; }
        .container { max-width: 1200px; margin: 0 auto; }
        h1 { color: white; text-align: center; margin: 30px 0; font-size: 2.5em; text-shadow: 2px 2px 4px rgba(0,0,0,0.2); }
        h2 { color: white; margin: 30px 0 15px; font-size: 1.8em; }
        .stats { background: white; border-radius: 15px; padding: 20px; margin-bottom: 30px; display: flex; gap: 20px; flex-wrap: wrap; }
        .stat-item { flex: 1; min-width: 150px; text-align: center; }
        .stat-value { font-size: 2.5em; font-weight: bold; color: #667eea; }
        .stat-label { color: #666; font-size: 0.9em; text-transform: uppercase; }
        .grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(200px, 1fr)); gap: 20px; margin-bottom: 40px; }
        .card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); transition: transform 0.3s; }
        .card:hover { transform: translateY(-10px); }
        .card img { width: 100%; height: 150px; object-fit: contain; background: #f5f5f5; padding: 10px; }
        .card .info { padding: 15px; text-align: center; }
        .card .nome { font-weight: bold; color: #333; margin-bottom: 5px; }
        .card .arquivo { font-size: 11px; color: #666; word-break: break-all; background: #f0f0f0; padding: 5px; border-radius: 5px; }
        .aplicacoes-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(300px, 1fr)); gap: 20px; }
        .app-card { background: white; border-radius: 15px; overflow: hidden; box-shadow: 0 10px 30px rgba(0,0,0,0.2); }
        .app-card img { width: 100%; height: 180px; object-fit: cover; }
        .app-info { padding: 15px; }
        .app-info h3 { color: #333; margin-bottom: 5px; }
        .app-info p { color: #666; font-size: 0.9em; margin-bottom: 10px; }
        .app-info .arquivo { background: #f0f0f0; padding: 5px; border-radius: 5px; font-size: 11px; word-break: break-all; }
        .badge { display: inline-block; padding: 3px 10px; border-radius: 12px; font-size: 10px; font-weight: bold; margin: 5px 2px; }
        .badge.success { background: #d4edda; color: #155724; }
    </style>
</head>
<body>
    <div class="container">
        <h1> DOWNLOAD DE IMAGENS - PARCEIROS E APLICAÇÕES</h1>
        
        <div class="stats">
            <div class="stat-item">
                <div class="stat-value">0</div>
                <div class="stat-label">Logos Baixados</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">0</div>
                <div class="stat-label">Aplicações Baixadas</div>
            </div>
            <div class="stat-item">
                <div class="stat-value">0</div>
                <div class="stat-label">Total (MB)</div>
            </div>
        </div>

        <h2> LOGOS DOS PARCEIROS</h2>
        <div class="grid">        </div>

        <h2> APLICAÇÕES PRÁTICAS</h2>
        <div class="aplicacoes-grid">        </div>
    </div>
</body>
</html>
